<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>வட்டி கணக்கீட்டாளர் - Interest Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f7f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .calculator-card {
            background: #ffffff;
            width: 100%;
            max-width: 460px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            padding: 24px;
            border: 1px solid #eaeaea;
        }

        .title {
            color: #b31d1d;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .section-label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #333333;
            margin-bottom: 8px;
        }

        /* Standardized Radio Button Layout Grid */
        .radio-group-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f0f2f3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 18px;
        }

        .radio-row {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            gap: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #333333;
            cursor: pointer;
            flex: 1;
        }

        .radio-option input[type="radio"] {
            width: auto;
            accent-color: #b31d1d;
            cursor: pointer;
            transform: scale(1.15);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333333;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 15px;
            color: #444444;
            background-color: #ffffff;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #b31d1d;
        }

        .submit-btn {
            width: 100%;
            background-color: #b31d1d;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #911616;
        }

        /* Result Presentation Block */
        .result-box {
            margin-top: 20px;
            padding: 16px;
            background-color: #fff9f9;
            border: 1px dashed #b31d1d;
            border-left: 4px solid #b31d1d;
            border-radius: 6px;
            display: none;
        }

        .result-box.active {
            display: block;
        }

        .result-line {
            font-size: 15px;
            margin-bottom: 8px;
            color: #333333;
        }

        /* Functional Share Layout */
        .share-btn {
            width: 100%;
            background-color: #25D366;
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .share-btn:hover {
            background-color: #1ebd58;
        }

        .switch-lang {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #666666;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <div class="title" id="calcTitle">வட்டி கணக்கீட்டாளர்</div>
    
    <form id="vattiForm" onsubmit="runCalculation(event)">
        <!-- Radio Toggle 1: Calculation Modes -->
        <span class="section-label" id="lblCalcMethod">கணக்கீடு முறை (Calculation Mode):</span>
        <div class="radio-group-container">
            <div class="radio-row">
                <label class="radio-option">
                    <input type="radio" name="interestMode" value="thani" checked onchange="switchMode('thani')">
                    <span id="optThani">தனி வட்டி (Simple)</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="interestMode" value="kootu" onchange="switchMode('kootu')">
                    <span id="optKootu">கூட்டு வட்டி (Compound)</span>
                </label>
            </div>
        </div>

        <!-- Dynamic Masked Currency Field -->
        <div class="form-group">
            <label id="lblAsal">அசல் தொகை (Asal):</label>
            <input type="text" id="asal" placeholder="எ.கா. 1,00,000" required oninput="handleAsalInput(this)">
        </div>

        <!-- Radio Toggle 2: Rate Category Type (Replacing Dropdown) -->
        <span class="section-label" id="lblVattiVagai">வட்டி வகை (Interest Type):</span>
        <div class="radio-group-container">
            <div class="radio-row">
                <label class="radio-option">
                    <input type="radio" name="rateCategory" value="rupee" checked onchange="adaptPlaceholder()">
                    <span id="optRupee">ரூபாய் / பைசா வட்டி (மாதத்திற்கு)</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="rateCategory" value="bank" onchange="adaptPlaceholder()">
                    <span id="optBank">Bank வட்டி % (ஆண்டிற்கு)</span>
                </label>
            </div>
        </div>

        <!-- Dynamic Interest Rate Selector -->
        <div class="form-group">
            <label id="lblVattiVigitham">வட்டி விகிதம்:</label>
            <input type="text" id="vattiRate" placeholder="எ.கா. 2 (ரூ.2 வட்டிக்கு)" required>
        </div>

        <!-- Compound Frequency Selection Rule -->
        <div class="form-group" id="compoundFreqGroup" style="display: none;">
            <label id="lblFreq">கூட்டு வட்டி முறை (Compounding Period):</label>
            <select id="compoundFreq">
                <option value="12">மாதமொருமுறை (Monthly)</option>
                <option value="4">மூன்று மாதமொருமுறை (Quarterly)</option>
                <option value="2">ஆறு மாதமொருமுறை (Half-Yearly)</option>
                <option value="1" selected>ஆண்டிற்கு ஒருமுறை (Annually)</option>
            </select>
        </div>

        <!-- Dates fields -->
        <div class="form-group">
            <label id="lblStartDate">தொடங்கிய தேதி:</label>
            <input type="date" id="startDate" required>
        </div>

        <div class="form-group">
            <label id="lblEndDate">முடிவுற்ற தேதி:</label>
            <input type="date" id="endDate" required>
        </div>

        <button type="submit" class="submit-btn" id="btnCalculate">வட்டியைக் கணக்கிடு</button>
    </form>

    <!-- Calculation Outputs Section -->
    <div class="result-box" id="resultDisplay"></div>
    
    <!-- WhatsApp Share Element -->
    <a id="btnShare" class="share-btn" style="display: none; text-decoration: none;" href="#" target="_blank">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.003 5.324 5.328 0 11.859 0c3.166.001 6.141 1.233 8.377 3.469 2.235 2.237 3.466 5.214 3.464 8.384-.003 6.536-5.328 11.86-11.859 11.86-.1.052-2.071-.05-3.056-.314L0 24zm6.177-3.693c1.076.638 2.232.975 3.425.976 5.433 0 9.85-4.414 9.853-9.845.002-2.63-1.023-5.101-2.885-6.964C14.76 2.612 12.289 1.58 9.66 1.58c-5.434 0-9.852 4.414-9.854 9.846-.001 1.25.333 2.474.966 3.535L.71 20.173l5.524-1.866zm10.742-5.47c-.287-.144-1.702-.84-1.966-.935-.264-.097-.456-.144-.648.144-.192.288-.744.936-.912 1.129-.168.192-.336.216-.624.072-.288-.145-1.215-.447-2.313-1.427-.855-.762-1.432-1.704-1.6-1.993-.168-.288-.018-.444.126-.587.13-.13.288-.337.432-.505.144-.169.192-.289.288-.481.097-.193.048-.361-.024-.505-.072-.144-.648-1.56-.888-2.136-.234-.564-.473-.488-.648-.497-.168-.008-.36-.01-.552-.01s-.504.071-.768.361c-.264.288-1.008.985-1.008 2.399 0 1.415 1.031 2.787 1.175 2.98.144.192 2.03 3.1 4.916 4.344.686.296 1.223.473 1.64.605.69.219 1.319.189 1.816.115.553-.083 1.703-.696 1.943-1.368.24-.672.24-1.25.168-1.368-.072-.119-.264-.192-.552-.337z"/></svg>
        வாட்ஸ்அப்பில் பகிர்க (WhatsApp Share)
    </a>

    <div class="switch-lang" id="langToggle" onclick="toggleLanguage()">Switch to English</div>
</div>
<script>
    let currentLang = 'ta';
    let currentMode = 'thani'; 

    const translations = {
        ta: {
            title: "வட்டி கணக்கீட்டாளர்",
            asal: "அசல் தொகை (Asal):",
            vagal: "வட்டி வகை (Interest Type):",
            calcMethod: "கணக்கீடு முறை (Calculation Mode):",
            vigitham: "வட்டி விகிதம்:",
            start: "தொடங்கிய தேதி:",
            end: "முடிவுற்ற தேதி:",
            btn: "வட்டியைக் கணக்கிடு",
            toggle: "Switch to English",
            freqLabel: "கூட்டு வட்டி முறை (Compounding Period):",
            placeholderRupee: "எ.கா. 2 (ரூ.2 வட்டிக்கு)",
            placeholderBank: "எ.கா. 7.5 (% ஆண்டிற்கு)",
            optThani: "தனி வட்டி (Simple)",
            optKootu: "கூட்டு வட்டி (Compound)",
            optRupee: "ரூபாய் / பைசா வட்டி (மாதத்திற்கு)",
            optBank: "Bank வட்டி % (ஆண்டிற்கு)"
        },
        en: {
            title: "Interest Calculator",
            asal: "Principal Amount (Asal):",
            vagal: "Interest Type:",
            calcMethod: "Calculation Mode:",
            vigitham: "Interest Rate:",
            start: "Start Date:",
            end: "End Date:",
            btn: "Calculate Interest",
            toggle: "தமிழில் மாற்றவும்",
            freqLabel: "Compounding Period:",
            placeholderRupee: "e.g. 2 (for Rs.2 Vatti)",
            placeholderBank: "e.g. 7.5 (% Per Annum)",
            optThani: "Simple Interest",
            optKootu: "Compound Interest",
            optRupee: "Rupee / Paisa Interest (Monthly)",
            optBank: "Bank Interest % (Per Annum)"
        }
    };

    // Helper functions for raw conversion and Indian comma masking matching lakh / crore boundaries
    function parseRawNumber(str) {
        return parseFloat(str.replace(/,/g, '')) || 0;
    }

    function formatIndianCurrency(amount) {
        if (isNaN(amount)) return "0.00";
        return new Intl.NumberFormat('en-IN', {
            maximumFractionDigits: 2,
            minimumFractionDigits: 2
        }).format(amount);
    }

    function formatAsalInput(value) {
        let clean = value.replace(/,/g, '').replace(/\D/g, '');
        if (!clean) return "";
        return new Intl.NumberFormat('en-IN').format(parseInt(clean, 10));
    }

    function handleAsalInput(inputElement) {
        let cursorPosition = inputElement.selectionStart;
        let originalLength = inputElement.value.length;
        
        inputElement.value = formatAsalInput(inputElement.value);
        
        let newLength = inputElement.value.length;
        cursorPosition = cursorPosition + (newLength - originalLength);
        inputElement.setSelectionRange(cursorPosition, cursorPosition);
    }

    function switchMode(mode) {
        currentMode = mode;
        const freqGroup = document.getElementById('compoundFreqGroup');
        freqGroup.style.display = (mode === 'kootu') ? 'block' : 'none';
        
        adaptPlaceholder();
        document.getElementById('resultDisplay').classList.remove('active');
        document.getElementById('btnShare').style.display = 'none';
    }

    function getSelectedRateCategory() {
        const radios = document.getElementsByName('rateCategory');
        for (let radio of radios) {
            if (radio.checked) return radio.value;
        }
        return 'rupee';
    }

    function adaptPlaceholder() {
        const type = getSelectedRateCategory();
        const rateInput = document.getElementById('vattiRate');
        rateInput.placeholder = (type === 'rupee') ? translations[currentLang].placeholderRupee : translations[currentLang].placeholderBank;
    }

    function toggleLanguage() {
        currentLang = (currentLang === 'ta') ? 'en' : 'ta';
        const t = translations[currentLang];
        
        document.getElementById('calcTitle').innerText = t.title;
        document.getElementById('lblCalcMethod').innerText = t.calcMethod;
        document.getElementById('lblAsal').innerText = t.asal;
        document.getElementById('lblVattiVagai').innerText = t.vagal;
        document.getElementById('lblVattiVigitham').innerText = t.vigitham;
        document.getElementById('lblStartDate').innerText = t.start;
        document.getElementById('lblEndDate').innerText = t.end;
        document.getElementById('btnCalculate').innerText = t.btn;
        document.getElementById('langToggle').innerText = t.toggle;
        document.getElementById('lblFreq').innerText = t.freqLabel;
        document.getElementById('optThani').innerText = t.optThani;
        document.getElementById('optKootu').innerText = t.optKootu;
        document.getElementById('optRupee').innerText = t.optRupee;
        document.getElementById('optBank').innerText = t.optBank;
        
        adaptPlaceholder();
    }

    function runCalculation(event) {
        event.preventDefault();
        
        const principal = parseRawNumber(document.getElementById('asal').value);
        const rate = parseFloat(document.getElementById('vattiRate').value);
        const type = getSelectedRateCategory();
        const startStr = document.getElementById('startDate').value;
        const endStr = document.getElementById('endDate').value;

        if (!startStr || !endStr || principal <= 0 || isNaN(rate)) return;

        const start = new Date(startStr);
        const end = new Date(endStr);
        
        if (end < start) {
            alert(currentLang === 'ta' ? "முடிவுற்ற தேதி தொடங்கிய தேதியை விட அதிகமாக இருக்க வேண்டும்!" : "End date must be after Start date!");
            return;
        }

        let years = end.getFullYear() - start.getFullYear();
        let months = end.getMonth() - start.getMonth();
        let days = end.getDate() - start.getDate();

        if (days < 0) {
            months -= 1;
            const prevMonthMax = new Date(end.getFullYear(), end.getMonth(), 0).getDate();
            days += prevMonthMax;
        }
        if (months < 0) {
            years -= 1;
            months += 12;
        }

        const totalMonths = (years * 12) + months + (days / 30);
        const totalYears = totalMonths / 12;

        let monthlyRateConverted = (type === 'rupee') ? rate : (rate / 12);

        let interest = 0;
        let totalAmount = 0;
        const modeLabelText = (currentMode === 'thani') ? 
            (currentLang === 'ta' ? "தனி வட்டி" : "Simple Interest") : 
            (currentLang === 'ta' ? "கூட்டு வட்டி" : "Compound Interest");

        if (currentMode === 'thani') {
            interest = (principal / 100) * monthlyRateConverted * totalMonths;
            totalAmount = principal + interest;
        } else {
            const timesCompoundedPerYear = parseInt(document.getElementById('compoundFreq').value, 10);
            if (type === 'rupee') {
                const annualEquivalentPercentage = (rate * 12); 
                totalAmount = principal * Math.pow((1 + (annualEquivalentPercentage / (100 * timesCompoundedPerYear))), (timesCompoundedPerYear * totalYears));
            } else {
                totalAmount = principal * Math.pow((1 + ((rate / 100) / timesCompoundedPerYear)), (timesCompoundedPerYear * totalYears));
            }
            interest = totalAmount - principal;
        }

        const display = document.getElementById('resultDisplay');
        display.classList.add('active');

        const durationTextString = currentLang === 'ta' ? 
            `${years} வருடம், ${months} மாதம், ${days} நாட்கள்` : 
            `${years} Year(s), ${months} Month(s), ${days} Day(s)`;

        const formattedPrincipal = formatIndianCurrency(principal);
        const formattedInterest = formatIndianCurrency(interest);
        const formattedTotal = formatIndianCurrency(totalAmount);

        if (currentLang === 'ta') {
            display.innerHTML = `
                <div class="result-line"><strong>கணக்கீடு முறை:</strong> ${modeLabelText}</div>
                <div class="result-line"><strong>அசல் தொகை:</strong> ₹${formattedPrincipal}</div>
                <div class="result-line"><strong>கால அளவு:</strong> ${durationTextString}</div>
                <div class="result-line"><strong>வட்டித் தொகை:</strong> ₹${formattedInterest}</div>
                <div class="result-line"><strong>மொத்தத் தொகை:</strong> ₹${formattedTotal}</div>
            `;
            generatedSummaryText = `*வட்டி விபரங்கள் (${modeLabelText})*\n\nஅசல் தொகை: ₹${formattedPrincipal}\nகால அளவு: ${durationTextString}\nவட்டித் தொகை: ₹${formattedInterest}\nமொத்தத் தொகை: ₹${formattedTotal}`;
        } else {
            display.innerHTML = `
                <div class="result-line"><strong>Calculation Type:</strong> ${modeLabelText}</div>
                <div class="result-line"><strong>Principal:</strong> ₹${formattedPrincipal}</div>
                <div class="result-line"><strong>Duration:</strong> ${durationTextString}</div>
                <div class="result-line"><strong>Interest Amount:</strong> ₹${formattedInterest}</div>
                <div class="result-line"><strong>Total Amount:</strong> ₹${formattedTotal}</div>
            `;
            generatedSummaryText = `*Interest Details (${modeLabelText})*\n\nPrincipal: ₹${formattedPrincipal}\nDuration: ${durationTextString}\nInterest Amount: ₹${formattedInterest}\nTotal Amount: ₹${formattedTotal}`;
        }

        // Fixed WhatsApp explicit redirect integration
        const shareLink = document.getElementById('btnShare');
        shareLink.href = "https://whatsapp.com" + encodeURIComponent(generatedSummaryText);
        shareLink.style.display = 'flex';
    }
</script>
</body>
</html>
