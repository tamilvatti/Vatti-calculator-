<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ஆன்லைன் வட்டி கணக்கீட்டாளர்: கிராமத்து ரூபாய் வட்டி, பைசா வட்டி, தனி வட்டி மற்றும் கூட்டு வட்டி ஆகியவற்றைத் துல்லியமாகக் கணக்கிட சிறந்த Village Vatti Calculator.">
<meta name="keywords" content="வட்டி கணக்கீட்டாளர், வட்டி கால்குலேட்டர், தனி வட்டி, கூட்டு வட்டி, ரூபாய் வட்டி, பைசா வட்டி கணக்கு, Village Vatti Calculator, Simple Interest, Compound Interest, Local Finance Calculation, Vatti Kanaku Tamil">

    <title>வட்டி கணக்கீட்டாளர் | Village Vatti Calculator - Local Simple & Compound Interest</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #f7f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .calculator-card {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 28px;
            border: 1px solid #eaeaea;
        }

        .title {
            color: #b31d1d;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 24px;
        }

        .section-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333333;
            margin-bottom: 8px;
        }

        .radio-group-row {
            display: flex;
            flex-direction: row;
            gap: 16px;
            margin-bottom: 20px;
            padding: 4px 0;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #495057;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            width: auto;
            accent-color: #b31d1d;
            cursor: pointer;
            transform: scale(1.15);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333333;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .input-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        /* Perfectly centers the text element */
        .divider-text {
            display: block;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #777777;
            margin: 20px auto;
            width: 100%;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            font-size: 15px;
            color: #444444;
            background-color: #ffffff !important;
            outline: none;
            height: 48px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        select:focus {
            border-color: #b31d1d;
        }

        .submit-btn {
            width: 100%;
            background-color: #b31d1d;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
            height: 50px;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #911616;
        }

        .result-box {
            margin-top: 24px;
            padding: 16px;
            background-color: #fffafA;
            border: 1px solid rgba(179, 29, 29, 0.15);
            border-radius: 12px;
            display: none;
        }

        .result-box.active {
            display: block;
        }

        .result-line {
            font-size: 14px;
            margin-bottom: 10px;
            color: #495057;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 6px;
            border-bottom: 1px dashed #f1f3f5;
        }

        .result-line:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .result-value {
            font-weight: 700;
            color: #212529;
            text-align: right;
        }

        .result-value.highlight {
            color: #b31d1d;
            font-size: 16px;
        }

        .action-row {
            display: none;
            gap: 10px;
            margin-top: 16px;
        }

        .action-row.active {
            display: flex;
        }

        .share-btn {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 48px;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .share-btn:hover {
            background-color: #1ebd58;
        }

        .copy-icon-btn {
            width: 48px;
            height: 48px;
            background-color: #f1f3f5;
            border: 1px solid #cccccc;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #495057;
            transition: background 0.2s;
        }

        .copy-icon-btn:hover {
            background-color: #e2e6ea;
        }

        .switch-lang {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #666666;
            text-decoration: underline;
            cursor: pointer;
        }

        .switch-lang:hover {
            color: #b31d1d;
        }
    </style>
</head>
<body>
<div class="calculator-card">
    <div class="title" id="calcTitle">வட்டி கணக்கீட்டாளர்</div>
    
    <form id="vattiForm" onsubmit="runCalculation(event)">
        <span class="section-label" id="lblCalcMethod">கணக்கீடு முறை:</span>
        <div class="radio-group-row">
            <label class="radio-option">
                <input type="radio" name="interestMode" value="thani" checked onchange="switchMode('thani')">
                <span id="optThani">தனி வட்டி</span>
            </label>
            <label class="radio-option">
                <input type="radio" name="interestMode" value="kootu" onchange="switchMode('kootu')">
                <span id="optKootu">கூட்டு வட்டி</span>
            </label>
        </div>

        <div class="form-group">
            <label id="lblAsal">அசல் தொகை (Asal):</label>
            <input type="text" id="asal" placeholder="எ.கா. 1,00,000" required oninput="handleAsalInput(this)">
        </div>

        <div class="form-group">
            <label id="lblVattiVagai">வட்டி வகை:</label>
            <select id="vattiVagai" onchange="adaptPlaceholder()">
                <option value="rupee" id="optRupee">ரூபாய் / பைசா வட்டி (மாதத்திற்கு)</option>
                <option value="bank" id="optBank">Bank வட்டி % (ஆண்டிற்கு)</option>
            </select>
        </div>

        <div class="form-group">
            <label id="lblVattiVigitham">வட்டி விகிதம்:</label>
            <input type="text" id="vattiRate" placeholder="எ.கா. 2 (ரூ.2 வட்டிக்கு)" required>
        </div>

        <div class="form-group" id="compoundFreqGroup" style="display: none;">
            <label id="lblFreq">கூட்டு வட்டி முறை:</label>
            <select id="compoundFreq">
                <option value="12" id="optMonthly">மாதமொருமுறை</option>
                <option value="4" id="optQuarterly">மூன்று மாதமொருமுறை</option>
                <option value="2" id="optHalfYearly">ஆறு மாதமொருமுறை</option>
                <option value="1" id="optAnnually" selected>ஆண்டிற்கு ஒருமுறை</option>
            </select>
        </div>

        <div class="form-group">
            <label id="lblKaalaAlavu">கால அளவு (நேரடியாக உள்ளிடவும்):</label>
            <div class="input-row-3">
                <input type="number" id="inputYears" placeholder="வருடம்" min="0" oninput="clearCalendarInputs()">
                <input type="number" id="inputMonths" placeholder="மாதம்" min="0" max="11" oninput="clearCalendarInputs()">
                <input type="number" id="inputDays" placeholder="நாள்" min="0" max="30" oninput="clearCalendarInputs()">
            </div>
        </div>

        <!-- Centered structural divider element text layout node -->
        <span class="divider-text" id="lblDivider">- அல்லது -</span>

        <div class="form-group">
            <label id="lblStartDate">தொடங்கிய தேதி:</label>
            <input type="date" id="startDate" onchange="clearDirectInputs()">
        </div>

        <div class="form-group">
            <label id="lblEndDate">முடிவுற்ற தேதி:</label>
            <input type="date" id="endDate" onchange="clearDirectInputs()">
        </div>

        <button type="submit" class="submit-btn" id="btnCalculate">வட்டியைக் கணக்கிடு</button>
    </form>

    <div class="result-box" id="resultDisplay"></div>
    
    <div class="action-row" id="buttonsBar">
        <button type="button" class="share-btn" onclick="shareDirectToWhatsApp()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.003 5.324 5.328 0 11.859 0c3.166.001 6.141 1.233 8.377 3.469 2.235 2.237 3.466 5.214 3.464 8.384-.003 6.536-5.328 11.86-11.859 11.86-.1.052-2.071-.05-3.056-.314L0 24zm6.177-3.693c1.076.638 2.232.975 3.425.976 5.433 0 9.85-4.414 9.853-9.845.002-2.63-1.023-5.101-2.885-6.964C14.76 2.612 12.289 1.58 9.66 1.58c-5.434 0-9.852 4.414-9.854 9.846-.001 1.25.333 2.474.966 3.535L.71 20.173l5.524-1.866zm10.742-5.47c-.287-.144-1.702-.84-1.966-.935-.264-.097-.456-.144-.648.144-.192.288-.744.936-.912 1.129-.168.192-.336.216-.624.072-.288-.145-1.215-.447-2.313-1.427-.855-.762-1.432-1.704-1.609-1.993-.168-.288-.018-.444.126-.587.13-.13.288-.337.432-.505.144-.169.192-.289.288-.481.097-.193.048-.361-.024-.505-.072-.144-.648-1.56-.888-2.136-.234-.564-.473-.488-.648-.497-.168-.008-.36-.01-.552-.01s-.504.071-.768.361c-.264.288-1.008.985-1.008 2.399 0 1.415 1.031 2.787 1.175 2.98.144.192 2.03 3.1 4.916 4.344.686.296 1.223.473 1.64.605.69.219 1.319.189 1.816.115.553-.083 1.703-.696 1.943-1.368.24-.672.24-1.25.168-1.368-.072-.119-.264-.192-.552-.337z"/></svg>
            <span id="txtShareBtn">WhatsApp பகிர்க</span>
        </button>
        <button type="button" class="copy-icon-btn" onclick="copyDataTextToClipboard()" title="Copy to Clipboard">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
    </div>
    
    <div class="switch-lang" id="langToggle" onclick="toggleLanguage()">Switch to English</div>
</div>

<script>
    let currentLang = 'ta';
    let currentMode = 'thani'; 
    let clipboardTextRaw = ""; 
    let finalWhatsAppMessageText = ""; 

    const translations = {
        ta: {
            title: "வட்டி கணக்கீட்டாளர்",
            asal: "அசல் தொகை (Asal):",
            vagal: "வட்டி வகை:",
            calcMethod: "கணக்கீடு முறை:",
            vigitham: "வட்டி விகிதம்:",
            start: "தொடங்கிய தேதி:",
            end: "முடிவுற்ற தேதி:",
            btn: "வட்டியைக் கணக்கிடு",
            toggle: "Switch to English",
            freqLabel: "கூட்டு வட்டி முறை:",
            placeholderRupee: "எ.கா. 2 (ரூ.2 வட்டிக்கு)",
            placeholderBank: "எ.கா. 7.5 (% ஆண்டிற்கு)",
            optThani: "தனி வட்டி",
            optKootu: "கூட்டு வட்டி",
            optRupee: "ரூபாய் / பைசா வட்டி (மாதத்திற்கு)",
            optBank: "Bank வட்டி % (ஆண்டிற்கு)",
            optMonthly: "மாதமொருமுறை",
            optQuarterly: "மூன்று மாதமொருமுறை",
            optHalfYearly: "ஆறு மாதமொருமுறை",
            optAnnually: "ஆண்டிற்கு ஒருமுறை",
            shareBtn: "WhatsApp பகிர்க",
            kaalaAlavu: "கால அளவு (நேரடியாக உள்ளிடவும்):",
            divider: "- அல்லது -",
            pYear: "வருடம்", pMonth: "மாதம்", pDay: "நாள்"
        },
        en: {
            title: "Interest Calculator",
            asal: "Principal Amount (Asal):",
            vagal: "Interest Type:",
            calcMethod: "Calculation Mode:",
            vigitham: "Interest Rate:",
            start: "Start Date:",
            end: "End Date:",
            btn: "Calculate Interest",
            toggle: "தமிழில் மாற்றவும்",
            freqLabel: "Compounding Period:",
            placeholderRupee: "e.g. 2 (for Rs.2 Vatti)",
            placeholderBank: "e.g. 7.5 (% Per Annum)",
            optThani: "Simple Interest",
            optKootu: "Compound Interest",
            optRupee: "Rupee / Paisa Vatti (Monthly)",
            optBank: "Bank Interest % (Annually)",
            optMonthly: "Monthly",
            optQuarterly: "Quarterly",
            optHalfYearly: "Half-Yearly",
            optAnnually: "Annually",
            shareBtn: "Share on WhatsApp",
            kaalaAlavu: "Duration (Enter Directly):",
            divider: "- OR -",
            pYear: "Years", pMonth: "Months", pDay: "Days"
        }
    };

    function parseRawNumber(str) {
        return parseFloat(str.replace(/,/g, '')) || 0;
    }

    function formatIndianCurrency(amount) {
        if (isNaN(amount)) return "0.00";
        let parts = amount.toFixed(2).split('.');
        let numStr = parts[0];     
        let decimals = parts[1];   
        if (numStr.length <= 3) return numStr + '.' + decimals;
        let lastThree = numStr.substring(numStr.length - 3);
        let otherNumbers = numStr.substring(0, numStr.length - 3);
        let formatted = otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ",") + "," + lastThree;
        return formatted + '.' + decimals;
    }

    function formatAsalInput(value) {
        let clean = value.replace(/,/g, '').replace(/\D/g, '');
        if (!clean) return "";
        let num = parseInt(clean, 10);
        let str = num.toString();
        if (str.length <= 3) return str;
        let lastThree = str.substring(str.length - 3);
        let otherNumbers = str.substring(0, str.length - 3);
        return otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ",") + "," + lastThree;
    }

    // Handles layout currency masking on keystrokes
    function handleAsalInput(inputElement) {
        let cursorPosition = inputElement.selectionStart;
        let originalLength = inputElement.value.length;
        inputElement.value = formatAsalInput(inputElement.value);
        let newLength = inputElement.value.length;
        cursorPosition = cursorPosition + (newLength - originalLength);
        inputElement.setSelectionRange(cursorPosition, cursorPosition);
    }

    function clearDirectInputs() {
        if(document.getElementById('startDate').value || document.getElementById('endDate').value) {
            document.getElementById('inputYears').value = "";
            document.getElementById('inputMonths').value = "";
            document.getElementById('inputDays').value = "";
        }
    }

    function clearCalendarInputs() {
        document.getElementById('startDate').value = "";
        document.getElementById('endDate').value = "";
    }

    function adaptPlaceholder() {
        const typeEl = document.getElementById('vattiVagai');
        const rateInput = document.getElementById('vattiRate');
        if (typeEl && rateInput && translations && translations[currentLang]) {
            const type = typeEl.value;
            rateInput.placeholder = (type === 'rupee') ? translations[currentLang].placeholderRupee : translations[currentLang].placeholderBank;
        }
    }

    function switchMode(mode) {
        currentMode = mode;
        const freqGroup = document.getElementById('compoundFreqGroup');
        if (freqGroup) {
            freqGroup.style.display = (mode === 'kootu') ? 'block' : 'none';
        }
        adaptPlaceholder();
        document.getElementById('resultDisplay').classList.remove('active');
        document.getElementById('buttonsBar').classList.remove('active');
    }

    function toggleLanguage() {
        currentLang = (currentLang === 'ta') ? 'en' : 'ta';
        const t = translations[currentLang];
        
        document.getElementById('calcTitle').innerText = t.title;
        document.getElementById('lblCalcMethod').innerText = t.calcMethod;
        document.getElementById('lblAsal').innerText = t.asal;
        document.getElementById('lblVattiVagai').innerText = t.vagal;
        document.getElementById('lblVattiVigitham').innerText = t.vigitham;
        document.getElementById('lblStartDate').innerText = t.start;
        document.getElementById('lblEndDate').innerText = t.end;
        document.getElementById('btnCalculate').innerText = t.btn;
        document.getElementById('langToggle').innerText = t.toggle;
        document.getElementById('lblFreq').innerText = t.freqLabel;
        document.getElementById('optThani').innerText = t.optThani;
        document.getElementById('optKootu').innerText = t.optKootu;
        document.getElementById('optRupee').innerText = t.optRupee;
        document.getElementById('optBank').innerText = t.optBank;
        document.getElementById('optMonthly').innerText = t.optMonthly;
        document.getElementById('optQuarterly').innerText = t.optQuarterly;
        document.getElementById('optHalfYearly').innerText = t.optHalfYearly;
        document.getElementById('optAnnually').innerText = t.optAnnually;
        document.getElementById('txtShareBtn').innerText = t.shareBtn;
        document.getElementById('lblKaalaAlavu').innerText = t.kaalaAlavu;
        document.getElementById('lblDivider').innerText = t.divider;
        
        document.getElementById('inputYears').placeholder = t.pYear;
        document.getElementById('inputMonths').placeholder = t.pMonth;
        document.getElementById('inputDays').placeholder = t.pDay;
        
        document.getElementById('resultDisplay').classList.remove('active');
        document.getElementById('buttonsBar').classList.remove('active');
        adaptPlaceholder();
    }
    function runCalculation(event) {
        event.preventDefault();
        
        const principal = parseRawNumber(document.getElementById('asal').value);
        const rate = parseFloat(document.getElementById('vattiRate').value);
        const type = document.getElementById('vattiVagai').value;
        
        let years = parseInt(document.getElementById('inputYears').value, 10) || 0;
        let months = parseInt(document.getElementById('inputMonths').value, 10) || 0;
        let days = parseInt(document.getElementById('inputDays').value, 10) || 0;

        const startStr = document.getElementById('startDate').value;
        const endStr = document.getElementById('endDate').value;

        if (startStr && endStr && years === 0 && months === 0 && days === 0) {
            const start = new Date(startStr);
            const end = new Date(endStr);
            if (end < start) {
                alert(currentLang === 'ta' ? "முடிவுற்ற தேதி தொடங்கிய தேதியை விட அதிகமாக இருக்க வேண்டும்!" : "End date must be after Start date!");
                return;
            }
            years = end.getFullYear() - start.getFullYear();
            months = end.getMonth() - start.getMonth();
            days = end.getDate() - start.getDate();

            if (days < 0) {
                months -= 1;
                const prevMonthMax = new Date(end.getFullYear(), end.getMonth(), 0).getDate();
                days += prevMonthMax;
            }
            if (months < 0) {
                years -= 1;
                months += 12;
            }
        }

        if (principal <= 0 || isNaN(rate) || (years === 0 && months === 0 && days === 0)) {
            alert(currentLang === 'ta' ? "விவரங்களைச் சரியாக உள்ளிடவும்!" : "Please enter the duration details correctly!");
            return;
        }

        let totalMonths = 0;
        let totalYears = 0;

        if (type === 'rupee') {
            totalMonths = (years * 12) + months + (days / 30);
            totalYears = totalMonths / 12;
        } else {
            const exactTotalDays = Math.round((years * 365.25) + (months * 30.4375) + days);
            totalMonths = exactTotalDays / 30.4375;
            totalYears = exactTotalDays / 365.25;
        }

        let monthlyRateConverted = (type === 'rupee') ? rate : (rate / 12);
        let interest = 0;
        let totalAmount = 0;
        
        let modeLabelText = currentLang === 'ta' ? ((currentMode === 'thani') ? "தனி வட்டி" : "கூட்டு வட்டி") : ((currentMode === 'thani') ? "Simple Interest" : "Compound Interest");

        if (currentMode === 'thani') {
            interest = (principal / 100) * monthlyRateConverted * totalMonths;
            totalAmount = principal + interest;
        } else {
            const timesCompoundedPerYear = parseInt(document.getElementById('compoundFreq').value, 10);
            if (type === 'rupee') {
                const annualEquivalentPercentage = (rate * 12); 
                totalAmount = principal * Math.pow((1 + (annualEquivalentPercentage / (100 * timesCompoundedPerYear))), (totalYears * timesCompoundedPerYear));
            } else {
                totalAmount = principal * Math.pow((1 + ((rate / 100) / timesCompoundedPerYear)), (timesCompoundedPerYear * totalYears));
            }
            interest = totalAmount - principal;
        }

        const display = document.getElementById('resultDisplay');
        display.innerHTML = "";
        display.classList.add('active');

        let durationTextString = currentLang === 'ta' 
            ? `${years} வருடம், ${months} மாதம், ${days} நாட்கள்`
            : `${years} Year(s), ${months} Month(s), ${days} Day(s)`;

        const formattedPrincipal = formatIndianCurrency(principal);
        const formattedInterest = formatIndianCurrency(interest);
        const formattedTotal = formatIndianCurrency(totalAmount);

        let outMessageText = "";
        let labels = {};

        if (currentLang === 'ta') {
            labels = { method: "கணக்கீடு முறை", principal: "அசல் தொகை", duration: "கால அளவு", interest: "வட்டித் தொகை", total: "மொத்தத் தொகை" };
            outMessageText = `*வட்டி விபரங்கள் (${modeLabelText})*\n\n• அசல் தொகை: ₹${formattedPrincipal}\n• கால அளவு: ${durationTextString}\n• வட்டித் தொகை: ₹${formattedInterest}\n• மொத்தத் தொகை: ₹${formattedTotal}`;
            clipboardTextRaw = `வட்டி விபரங்கள் (${modeLabelText})\nஅசல் தொகை: ₹${formattedPrincipal}\nகால அளவு: ${durationTextString}\nவட்டித் தொகை: ₹${formattedInterest}\nமொத்தத் தொகை: ₹${formattedTotal}`;
        } else {
            labels = { method: "Calculation Type", principal: "Principal Amount", duration: "Duration", interest: "Interest Amount", total: "Total Amount" };
            outMessageText = `*Interest Details (${modeLabelText})*\n\n• Principal Amount: ₹${formattedPrincipal}\n• Duration: ${durationTextString}\n• Interest Amount: ₹${formattedInterest}\n• Total Amount: ₹${formattedTotal}`;
            clipboardTextRaw = `Interest Details (${modeLabelText})\nPrincipal Amount: ₹${formattedPrincipal}\nDuration: ${durationTextString}\nInterest Amount: ₹${formattedInterest}\nTotal Amount: ₹${formattedTotal}`;
        }

        display.innerHTML = 
            `<div class="result-line"><span>${labels.method}</span><span class="result-value">${modeLabelText}</span></div>` +
            `<div class="result-line"><span>${labels.principal}</span><span class="result-value">₹${formattedPrincipal}</span></div>` +
            `<div class="result-line"><span>${labels.duration}</span><span class="result-value">${durationTextString}</span></div>` +
            `<div class="result-line"><span>${labels.interest}</span><span class="result-value highlight">₹${formattedInterest}</span></div>` +
            `<div class="result-line"><span>${labels.total}</span><span class="result-value highlight">₹${formattedTotal}</span></div>`;

        finalWhatsAppMessageText = outMessageText;
        document.getElementById('buttonsBar').classList.add('active');
    }

    function shareDirectToWhatsApp() {
        if (!finalWhatsAppMessageText) return;
        const nativeProtocolUrl = "whatsapp://send?text=" + encodeURIComponent(finalWhatsAppMessageText);
        const webFallbackUrl = "https://whatsapp.com" + encodeURIComponent(finalWhatsAppMessageText);
        window.location.href = nativeProtocolUrl;
        setTimeout(() => { window.location.href = webFallbackUrl; }, 500);
    }

    function copyDataTextToClipboard() {
        if (!clipboardTextRaw) return;
        navigator.clipboard.writeText(clipboardTextRaw).then(() => {
            alert(currentLang === 'ta' ? "விவரங்கள் நகலெடுக்கப்பட்டது!" : "Details copied to clipboard!");
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        adaptPlaceholder();
    });
</script>
</body>
</html>
